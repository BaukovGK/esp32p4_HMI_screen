  # =========================================================================
  # UPDATE LOGIC (interval-based, like 250ms refresh timer)
  # =========================================================================
  on_idle:
    - interval: 250ms
      then:
        - lambda: |-
            // --- Update alarm bar mode label ---
            auto mode_lbl = id(lbl_mode);
            auto mqtt_lbl = id(lbl_mqtt_status);

            // MQTT status
            if (id(mqtt_connected)) {
              lv_label_set_text(mqtt_lbl, "MQTT:OK");
              lv_obj_set_style_text_color(mqtt_lbl, lv_color_hex(0x00FF88), 0);
            } else {
              lv_label_set_text(mqtt_lbl, "MQTT:--");
              lv_obj_set_style_text_color(mqtt_lbl, lv_color_hex(0xFF0000), 0);
            }

            // Mode label color by state
            uint32_t state_color;
            const char* state_text;
            switch(id(plant_state)) {
              case 0: state_color = 0x6C757D; state_text = "IDLE"; break;
              case 1: state_color = 0x28A745; state_text = "AUTO"; break;
              case 2: state_color = 0x007BFF; state_text = "WASHING"; break;
              case 3: state_color = 0xFFC107; state_text = "MANUAL"; break;
              case 4: state_color = 0xDC3545; state_text = "FAULT"; break;
              default: state_color = 0x6C757D; state_text = "---"; break;
            }
            lv_label_set_text(mode_lbl, state_text);
            lv_obj_set_style_text_color(mode_lbl, lv_color_hex(state_color), 0);

            // --- Update RESET FAULT button visibility ---
            bool is_fault = (id(plant_state) == 4);
            if (is_fault) {
              lv_obj_clear_flag(id(btn_mnem_reset), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(btn_alarm_reset), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_add_flag(id(btn_mnem_reset), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(btn_alarm_reset), LV_OBJ_FLAG_HIDDEN);
            }

            // --- Update washing buttons visibility ---
            bool is_washing = (id(plant_state) == 2);
            if (is_washing) {
              lv_obj_add_flag(id(btn_wash_start), LV_OBJ_FLAG_HIDDEN);
              lv_obj_clear_flag(id(btn_wash_stop), LV_OBJ_FLAG_HIDDEN);
              // Show confirm only in wait phases (sub 0, 2, 4)
              int ws = id(wash_substate);
              if (ws == 0 || ws == 2 || ws == 4) {
                lv_obj_clear_flag(id(btn_wash_confirm), LV_OBJ_FLAG_HIDDEN);
              } else {
                lv_obj_add_flag(id(btn_wash_confirm), LV_OBJ_FLAG_HIDDEN);
              }
            } else {
              lv_obj_clear_flag(id(btn_wash_start), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(btn_wash_stop), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(btn_wash_confirm), LV_OBJ_FLAG_HIDDEN);
            }
