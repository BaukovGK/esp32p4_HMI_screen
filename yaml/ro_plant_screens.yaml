# =============================================================================
# RO Plant - LVGL Screen Definitions
# 6 screens: Mnemonic, Parameters, Washing, Alarms, Settings, Diagnostics
# ESPHome LVGL component format
# =============================================================================
#
# NOTE: ESPHome's LVGL support is evolving. This file uses the lvgl: component
# syntax. Some features (like complex P&ID diagrams with custom drawing) may
# require custom components. This YAML represents the closest possible
# approximation using standard LVGL widgets.
#
# Display: 1280x800 landscape
# Layout: [Alarm Bar 40px] [Content 700px] [Nav Bar 60px]
# =============================================================================

lvgl:
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  # --- Theme ---
  theme:
    obj:
      bg_color: 0x1A1A2E
      text_color: 0xE8E8E8
      border_color: 0x0F3460
    btn:
      bg_color: 0x0F3460
      text_color: 0xE8E8E8
      radius: 6
    label:
      text_color: 0xE8E8E8
    textarea:
      bg_color: 0x0F3460
      text_color: 0x00FF88
      border_color: 0x00B4D8
      border_width: 1
      radius: 4

  # =========================================================================
  # TOP-LEVEL LAYOUT
  # =========================================================================
  top_layer:
    widgets:
      # --- ALARM BAR (top 40px) ---
      - obj:
          id: alarm_bar
          x: 0
          y: 0
          width: 1280
          height: 40
          bg_color: 0x16213E
          pad_all: 4
          layout:
            type: flex
            flex_flow: ROW
            main_place: SPACE_BETWEEN
            cross_place: CENTER
          widgets:
            # Mode label
            - label:
                id: lbl_mode
                width: 250
                text_font: font_14
                text: "IDLE"
                text_color: 0x6C757D

            # Active alarm scrolling text
            - label:
                id: lbl_alarm_ticker
                width: 800
                text_font: font_14
                text: ""
                text_color: 0xFF8C00
                long_mode: SCROLL_CIRCULAR

            # MQTT status
            - label:
                id: lbl_mqtt_status
                width: 80
                text_font: font_14
                text: "MQTT:--"
                text_color: 0xFF0000

            # Language toggle button
            - btn:
                id: btn_lang
                width: 50
                height: 30
                bg_color: 0x0F3460
                on_click:
                  - lambda: |-
                      id(lang_ru) = !id(lang_ru);
                widgets:
                  - label:
                      id: lbl_lang
                      text: "RU"
                      text_font: font_14
                      align: CENTER

      # --- NAVIGATION BAR (bottom 60px) ---
      - obj:
          id: nav_bar
          x: 0
          y: 740
          width: 1280
          height: 60
          bg_color: 0x16213E
          pad_all: 4
          layout:
            type: flex
            flex_flow: ROW
            main_place: SPACE_EVENLY
            cross_place: CENTER
          widgets:
            - btn:
                id: nav_mnemonic
                width: 190
                height: 50
                bg_color: 0x00B4D8
                on_click:
                  - lvgl.page.show: page_mnemonic
                  - lambda: id(current_screen) = 0;
                widgets:
                  - label:
                      text: "Мнемосхема"
                      text_font: font_14
                      align: CENTER
            - btn:
                id: nav_parameters
                width: 190
                height: 50
                bg_color: 0x0F3460
                on_click:
                  - lvgl.page.show: page_parameters
                  - lambda: id(current_screen) = 1;
                widgets:
                  - label:
                      text: "Параметры"
                      text_font: font_14
                      align: CENTER
            - btn:
                id: nav_washing
                width: 190
                height: 50
                bg_color: 0x0F3460
                on_click:
                  - lvgl.page.show: page_washing
                  - lambda: id(current_screen) = 2;
                widgets:
                  - label:
                      text: "Промывка"
                      text_font: font_14
                      align: CENTER
            - btn:
                id: nav_alarms
                width: 190
                height: 50
                bg_color: 0x0F3460
                on_click:
                  - lvgl.page.show: page_alarms
                  - lambda: id(current_screen) = 3;
                widgets:
                  - label:
                      text: "Аварии"
                      text_font: font_14
                      align: CENTER
            - btn:
                id: nav_settings
                width: 190
                height: 50
                bg_color: 0x0F3460
                on_click:
                  - lvgl.page.show: page_settings
                  - lambda: id(current_screen) = 4;
                widgets:
                  - label:
                      text: "Настройки"
                      text_font: font_14
                      align: CENTER
            - btn:
                id: nav_diagnostics
                width: 190
                height: 50
                bg_color: 0x0F3460
                on_click:
                  - lvgl.page.show: page_diagnostics
                  - lambda: id(current_screen) = 5;
                widgets:
                  - label:
                      text: "Диагностика"
                      text_font: font_14
                      align: CENTER

  # =========================================================================
  # PAGES (SCREENS)
  # =========================================================================
  pages:
    # =====================================================================
    # PAGE 0: MNEMONIC (P&ID Diagram)
    # =====================================================================
    - id: page_mnemonic
      bg_color: 0x1A1A2E
      width: 1280
      height: 700
      y: 40
      widgets:
        # --- SOURCE TANK ---
        - obj:
            id: tank_source
            x: 15
            y: 15
            width: 80
            height: 220
            bg_color: 0x1A1A2E
            border_color: 0x00B4D8
            border_width: 2
            radius: 4
            widgets:
              # Tank fill level (dynamic height)
              - obj:
                  id: tank_source_fill
                  x: 2
                  width: 74
                  height: 0
                  bg_color: 0x00B4D8
                  bg_opa: 150
                  align: BOTTOM_MID
              - label:
                  text: "Исходный"
                  text_font: font_12
                  text_color: 0x8899AA
                  align: TOP_MID
                  y: -18

        # --- FEED PUMP (circle) ---
        - obj:
            id: pump_feed
            x: 210
            y: 80
            width: 60
            height: 60
            radius: 30
            bg_color: 0x4A4A4A
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label:
                  text: "P1"
                  text_font: font_16
                  text_color: 0xE8E8E8
                  align: CENTER

        # Pipe: Source → Feed pump
        - obj:
            x: 97
            y: 108
            width: 113
            height: 4
            bg_color: 0x00B4D8

        # --- STAGE1 PUMP (circle) ---
        - obj:
            id: pump_stage1
            x: 355
            y: 80
            width: 60
            height: 60
            radius: 30
            bg_color: 0x4A4A4A
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label:
                  text: "P2"
                  text_font: font_16
                  text_color: 0xE8E8E8
                  align: CENTER

        # Pipe: Feed pump → Stage1 pump
        - obj:
            x: 272
            y: 108
            width: 83
            height: 4
            bg_color: 0x00B4D8

        # --- MEMBRANE 1 ---
        - obj:
            id: membrane1
            x: 500
            y: 70
            width: 100
            height: 80
            bg_color: 0x1A3A5C
            border_color: 0x00B4D8
            border_width: 2
            radius: 6
            widgets:
              - label:
                  text: "M1"
                  text_font: font_20
                  text_color: 0x00B4D8
                  align: CENTER

        # Pipe: Stage1 → Membrane1
        - obj:
            x: 417
            y: 108
            width: 83
            height: 4
            bg_color: 0x00B4D8

        # --- INTERMEDIATE TANK ---
        - obj:
            id: tank_intermediate
            x: 655
            y: 15
            width: 80
            height: 220
            bg_color: 0x1A1A2E
            border_color: 0x00B4D8
            border_width: 2
            radius: 4
            widgets:
              - obj:
                  id: tank_inter_fill
                  x: 2
                  width: 74
                  height: 0
                  bg_color: 0x00B4D8
                  bg_opa: 150
                  align: BOTTOM_MID
              - label:
                  text: "Промежут."
                  text_font: font_12
                  text_color: 0x8899AA
                  align: TOP_MID
                  y: -18

        # Pipe: Membrane1 → Intermediate tank
        - obj:
            x: 602
            y: 108
            width: 53
            height: 4
            bg_color: 0x00B4D8

        # --- STAGE2 PUMP (circle) ---
        - obj:
            id: pump_stage2
            x: 850
            y: 80
            width: 60
            height: 60
            radius: 30
            bg_color: 0x4A4A4A
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label:
                  text: "P3"
                  text_font: font_16
                  text_color: 0xE8E8E8
                  align: CENTER

        # Pipe: Intermediate → Stage2
        - obj:
            x: 737
            y: 108
            width: 113
            height: 4
            bg_color: 0x00B4D8

        # --- MEMBRANE 2 ---
        - obj:
            id: membrane2
            x: 995
            y: 70
            width: 100
            height: 80
            bg_color: 0x1A3A5C
            border_color: 0x00B4D8
            border_width: 2
            radius: 6
            widgets:
              - label:
                  text: "M2"
                  text_font: font_20
                  text_color: 0x00B4D8
                  align: CENTER

        # Pipe: Stage2 → Membrane2
        - obj:
            x: 912
            y: 108
            width: 83
            height: 4
            bg_color: 0x00B4D8

        # --- PERMEATE TANK ---
        - obj:
            id: tank_permeate
            x: 1150
            y: 15
            width: 80
            height: 220
            bg_color: 0x1A1A2E
            border_color: 0x00B4D8
            border_width: 2
            radius: 4
            widgets:
              - obj:
                  id: tank_perm_fill
                  x: 2
                  width: 74
                  height: 0
                  bg_color: 0x00B4D8
                  bg_opa: 150
                  align: BOTTOM_MID
              - label:
                  text: "Пермеат"
                  text_font: font_12
                  text_color: 0x8899AA
                  align: TOP_MID
                  y: -18

        # Pipe: Membrane2 → Permeate tank
        - obj:
            x: 1097
            y: 108
            width: 53
            height: 4
            bg_color: 0x00B4D8

        # --- HEATER indicator ---
        - obj:
            id: ind_heater
            x: 135
            y: 110
            width: 50
            height: 50
            radius: 25
            bg_color: 0x4A4A4A
            border_color: 0x00B4D8
            border_width: 1
            widgets:
              - label:
                  text: "H"
                  text_font: font_16
                  text_color: 0xE8E8E8
                  align: CENTER

        # --- DOSER indicator ---
        - obj:
            id: ind_doser
            x: 370
            y: 110
            width: 50
            height: 50
            radius: 25
            bg_color: 0x4A4A4A
            border_color: 0x00B4D8
            border_width: 1
            widgets:
              - label:
                  text: "D"
                  text_font: font_16
                  text_color: 0xE8E8E8
                  align: CENTER

        # ---- REJECT flow arrows (from membranes down) ----
        # Membrane 1 reject line
        - obj:
            x: 548
            y: 152
            width: 4
            height: 60
            bg_color: 0xFF8C00
        # Membrane 2 reject line
        - obj:
            x: 1043
            y: 152
            width: 4
            height: 60
            bg_color: 0xFF8C00

        # ====== SENSOR VALUES ROW ======
        # Temperature
        - label:
            id: lbl_temp
            x: 30
            y: 280
            text: "T: --- °C"
            text_font: font_16
            text_color: 0x00FF88

        # Flow Q1-Q4
        - label:
            id: lbl_q1
            x: 220
            y: 280
            text: "Q1: --- m³/h"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_q2
            x: 460
            y: 280
            text: "Q2: --- m³/h"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_q3
            x: 700
            y: 280
            text: "Q3: --- m³/h"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_q4
            x: 940
            y: 280
            text: "Q4: --- m³/h"
            text_font: font_16
            text_color: 0x00FF88

        # Pressure P1-P4
        - label:
            id: lbl_p1
            x: 220
            y: 310
            text: "P1: --- bar"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_p2
            x: 460
            y: 310
            text: "P2: --- bar"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_p3
            x: 700
            y: 310
            text: "P3: --- bar"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_p4
            x: 940
            y: 310
            text: "P4: --- bar"
            text_font: font_16
            text_color: 0x00FF88

        # Conductivity S1-S3
        - label:
            id: lbl_s1
            x: 30
            y: 340
            text: "S1: --- µS/cm"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_s2
            x: 430
            y: 340
            text: "S2: --- µS/cm"
            text_font: font_16
            text_color: 0x00FF88
        - label:
            id: lbl_s3
            x: 850
            y: 340
            text: "S3: --- µS/cm"
            text_font: font_16
            text_color: 0x00FF88

        # ====== TELEMETRY PANEL ======
        - obj:
            id: panel_telemetry
            x: 30
            y: 385
            width: 620
            height: 80
            bg_color: 0x16213E
            radius: 8
            pad_all: 12
            layout:
              type: flex
              flex_flow: ROW
              main_place: SPACE_BETWEEN
              cross_place: CENTER
            widgets:
              - obj:
                  width: 200
                  height: 60
                  bg_opa: 0
                  widgets:
                    - label:
                        text: "Recovery"
                        text_font: font_14
                        text_color: 0x8899AA
                        align: TOP_LEFT
                    - label:
                        id: lbl_recovery
                        text: "--- %"
                        text_font: font_28
                        text_color: 0x00FF88
                        align: BOTTOM_LEFT
              - obj:
                  width: 200
                  height: 60
                  bg_opa: 0
                  widgets:
                    - label:
                        text: "Filter dP"
                        text_font: font_14
                        text_color: 0x8899AA
                        align: TOP_LEFT
                    - label:
                        id: lbl_filter_dp
                        text: "--- bar"
                        text_font: font_28
                        text_color: 0x00FF88
                        align: BOTTOM_LEFT
              - obj:
                  width: 180
                  height: 60
                  bg_opa: 0
                  widgets:
                    - label:
                        text: "Режим"
                        text_font: font_14
                        text_color: 0x8899AA
                        align: TOP_LEFT
                    - label:
                        id: lbl_state_mnem
                        text: "IDLE"
                        text_font: font_28
                        text_color: 0x6C757D
                        align: BOTTOM_LEFT

        # ====== CONTROL BUTTONS ROW ======
        - obj:
            x: 15
            y: 500
            width: 1250
            height: 60
            bg_opa: 0
            layout:
              type: flex
              flex_flow: ROW
              main_place: START
              pad_column: 16
            widgets:
              # START AUTO
              - btn:
                  id: btn_mnem_start
                  width: 230
                  height: 54
                  bg_color: 0x2D6A4F
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "start_auto"
                  widgets:
                    - label:
                        text: "СТАРТ АВТО"
                        text_font: font_16
                        align: CENTER

              # STOP
              - btn:
                  id: btn_mnem_stop
                  width: 230
                  height: 54
                  bg_color: 0xE63946
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "stop"
                  widgets:
                    - label:
                        text: "СТОП"
                        text_font: font_16
                        align: CENTER

              # MANUAL
              - btn:
                  id: btn_mnem_manual
                  width: 230
                  height: 54
                  bg_color: 0xFFC107
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "set_manual"
                  widgets:
                    - label:
                        text: "РУЧНОЙ"
                        text_font: font_16
                        text_color: 0x1A1A2E
                        align: CENTER

              # START WASHING
              - btn:
                  id: btn_mnem_wash
                  width: 230
                  height: 54
                  bg_color: 0x007BFF
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "start_washing"
                  widgets:
                    - label:
                        text: "ПРОМЫВКА"
                        text_font: font_16
                        align: CENTER

              # RESET FAULT (hidden by default)
              - btn:
                  id: btn_mnem_reset
                  width: 230
                  height: 54
                  bg_color: 0xFF8C00
                  hidden: true
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "reset_fault"
                  widgets:
                    - label:
                        text: "СБРОС АВАРИИ"
                        text_font: font_16
                        align: CENTER

    # =====================================================================
    # PAGE 1: PARAMETERS (Data Table)
    # =====================================================================
    - id: page_parameters
      bg_color: 0x1A1A2E
      width: 1280
      height: 700
      y: 40
      scrollbar_mode: AUTO
      widgets:
        # --- Table Header ---
        - obj:
            x: 16
            y: 8
            width: 1248
            height: 36
            bg_color: 0x16213E
            radius: 4
            layout:
              type: flex
              flex_flow: ROW
              cross_place: CENTER
            widgets:
              - label:
                  width: 200
                  text: "Параметр"
                  text_font: font_16
                  text_color: 0x00B4D8
              - label:
                  width: 180
                  text: "Значение"
                  text_font: font_16
                  text_color: 0x00B4D8
              - label:
                  width: 180
                  text: "Доп."
                  text_font: font_16
                  text_color: 0x00B4D8
              - label:
                  width: 120
                  text: "Статус"
                  text_font: font_16
                  text_color: 0x00B4D8

        # --- PRESSURE SECTION ---
        - label:
            x: 16
            y: 52
            text: "Давление"
            text_font: font_18
            text_color: 0x00B4D8

        # P1 row
        - obj:
            x: 16
            y: 76
            width: 1248
            height: 32
            bg_opa: 0
            layout: {type: flex, flex_flow: ROW, cross_place: CENTER}
            widgets:
              - label: {width: 200, text: "P1 (вход)", text_font: font_14, text_color: 0x8899AA}
              - label: {id: tbl_p1, width: 180, text: "--- bar", text_font: font_16, text_color: 0x00FF88}
              - label: {width: 180, text: "", text_font: font_14}
              - label: {id: tbl_p1_st, width: 120, text: "---", text_font: font_14, text_color: 0x8899AA}
        # P2 row
        - obj:
            x: 16
            y: 110
            width: 1248
            height: 32
            bg_opa: 0
            layout: {type: flex, flex_flow: ROW, cross_place: CENTER}
            widgets:
              - label: {width: 200, text: "P2 (после фильтра)", text_font: font_14, text_color: 0x8899AA}
              - label: {id: tbl_p2, width: 180, text: "--- bar", text_font: font_16, text_color: 0x00FF88}
              - label: {width: 180, text: "", text_font: font_14}
              - label: {id: tbl_p2_st, width: 120, text: "---", text_font: font_14, text_color: 0x8899AA}
        # P3 row
        - obj:
            x: 16
            y: 144
            width: 1248
            height: 32
            bg_opa: 0
            layout: {type: flex, flex_flow: ROW, cross_place: CENTER}
            widgets:
              - label: {width: 200, text: "P3 (ступень 1)", text_font: font_14, text_color: 0x8899AA}
              - label: {id: tbl_p3, width: 180, text: "--- bar", text_font: font_16, text_color: 0x00FF88}
              - label: {width: 180, text: "", text_font: font_14}
              - label: {id: tbl_p3_st, width: 120, text: "---", text_font: font_14, text_color: 0x8899AA}
        # P4 row
        - obj:
            x: 16
            y: 178
            width: 1248
            height: 32
            bg_opa: 0
            layout: {type: flex, flex_flow: ROW, cross_place: CENTER}
            widgets:
              - label: {width: 200, text: "P4 (ступень 2)", text_font: font_14, text_color: 0x8899AA}
              - label: {id: tbl_p4, width: 180, text: "--- bar", text_font: font_16, text_color: 0x00FF88}
              - label: {width: 180, text: "", text_font: font_14}
              - label: {id: tbl_p4_st, width: 120, text: "---", text_font: font_14, text_color: 0x8899AA}

        # Separator
        - obj: {x: 16, y: 218, width: 1248, height: 1, bg_color: 0x0F3460}

        # --- TEMPERATURE SECTION ---
        - label:
            x: 16
            y: 226
            text: "Температура"
            text_font: font_18
            text_color: 0x00B4D8
        - obj:
            x: 16
            y: 250
            width: 1248
            height: 32
            bg_opa: 0
            layout: {type: flex, flex_flow: ROW, cross_place: CENTER}
            widgets:
              - label: {width: 200, text: "T (исходная)", text_font: font_14, text_color: 0x8899AA}
              - label: {id: tbl_temp, width: 180, text: "--- °C", text_font: font_16, text_color: 0x00FF88}

        # Separator
        - obj: {x: 16, y: 290, width: 1248, height: 1, bg_color: 0x0F3460}

        # --- FLOW SECTION ---
        - label:
            x: 16
            y: 298
            text: "Расход"
            text_font: font_18
            text_color: 0x00B4D8

        # Q1
        - obj:
            x: 16
            y: 322
            width: 1248
            height: 32
            bg_opa: 0
            layout: {type: flex, flex_flow: ROW, cross_place: CENTER}
            widgets:
              - label: {width: 200, text: "Q1 (питание)", text_font: font_14, text_color: 0x8899AA}
              - label: {id: tbl_q1, width: 180, text: "--- m³/h", text_font: font_16, text_color: 0x00FF88}
              - label: {id: tbl_q1_vol, width: 180, text: "--- m³", text_font: font_14, text_color: 0x8899AA}
              - label: {id: tbl_q1_st, width: 120, text: "---", text_font: font_14, text_color: 0x8899AA}
        # Q2
        - obj:
            x: 16
            y: 356
            width: 1248
            height: 32
            bg_opa: 0
            layout: {type: flex, flex_flow: ROW, cross_place: CENTER}
            widgets:
              - label: {width: 200, text: "Q2 (пермеат 1)", text_font: font_14, text_color: 0x8899AA}
