    # =====================================================================
    # PAGE 2: WASHING (7-Phase Stepper)
    # =====================================================================
    - id: page_washing
      bg_color: 0x1A1A2E
      width: 1280
      height: 700
      y: 40
      widgets:
        # --- STEPPER HEADER ---
        - label:
            x: 60
            y: 20
            text: "Цикл промывки"
            text_font: font_20
            text_color: 0x00B4D8

        # --- 7-PHASE STEPPER (circles + connecting lines) ---
        # Phase circles at y=70, spread across 1280px
        # Spacing: ~170px between centers, starting at x=60

        # Phase 1: Wait Heat
        - obj:
            id: wash_phase_1
            x: 60
            y: 70
            width: 56
            height: 56
            radius: 28
            bg_color: 0x0F3460
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label: {text: "1", text_font: font_20, text_color: 0xE8E8E8, align: CENTER}
        - label: {x: 44, y: 132, text: "Ожид.\nнагрева", text_font: font_12, text_color: 0x8899AA, text_align: CENTER}

        # Connector 1→2
        - obj: {id: wash_conn_12, x: 118, y: 96, width: 64, height: 4, bg_color: 0x4A4A4A}

        # Phase 2: Heating
        - obj:
            id: wash_phase_2
            x: 184
            y: 70
            width: 56
            height: 56
            radius: 28
            bg_color: 0x0F3460
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label: {text: "2", text_font: font_20, text_color: 0xE8E8E8, align: CENTER}
        - label: {x: 172, y: 132, text: "Нагрев", text_font: font_12, text_color: 0x8899AA, text_align: CENTER}

        # Connector 2→3
        - obj: {id: wash_conn_23, x: 242, y: 96, width: 64, height: 4, bg_color: 0x4A4A4A}

        # Phase 3: Wait Supply
        - obj:
            id: wash_phase_3
            x: 308
            y: 70
            width: 56
            height: 56
            radius: 28
            bg_color: 0x0F3460
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label: {text: "3", text_font: font_20, text_color: 0xE8E8E8, align: CENTER}
        - label: {x: 288, y: 132, text: "Ожид.\nподачи", text_font: font_12, text_color: 0x8899AA, text_align: CENTER}

        # Connector 3→4
        - obj: {id: wash_conn_34, x: 366, y: 96, width: 64, height: 4, bg_color: 0x4A4A4A}

        # Phase 4: Supply
        - obj:
            id: wash_phase_4
            x: 432
            y: 70
            width: 56
            height: 56
            radius: 28
            bg_color: 0x0F3460
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label: {text: "4", text_font: font_20, text_color: 0xE8E8E8, align: CENTER}
        - label: {x: 422, y: 132, text: "Подача", text_font: font_12, text_color: 0x8899AA, text_align: CENTER}

        # Connector 4→5
        - obj: {id: wash_conn_45, x: 490, y: 96, width: 64, height: 4, bg_color: 0x4A4A4A}

        # Phase 5: Wait Drain
        - obj:
            id: wash_phase_5
            x: 556
            y: 70
            width: 56
            height: 56
            radius: 28
            bg_color: 0x0F3460
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label: {text: "5", text_font: font_20, text_color: 0xE8E8E8, align: CENTER}
        - label: {x: 536, y: 132, text: "Ожид.\nслива", text_font: font_12, text_color: 0x8899AA, text_align: CENTER}

        # Connector 5→6
        - obj: {id: wash_conn_56, x: 614, y: 96, width: 64, height: 4, bg_color: 0x4A4A4A}

        # Phase 6: Drain
        - obj:
            id: wash_phase_6
            x: 680
            y: 70
            width: 56
            height: 56
            radius: 28
            bg_color: 0x0F3460
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label: {text: "6", text_font: font_20, text_color: 0xE8E8E8, align: CENTER}
        - label: {x: 674, y: 132, text: "Слив", text_font: font_12, text_color: 0x8899AA, text_align: CENTER}

        # Connector 6→7
        - obj: {id: wash_conn_67, x: 738, y: 96, width: 64, height: 4, bg_color: 0x4A4A4A}

        # Phase 7: Done
        - obj:
            id: wash_phase_7
            x: 804
            y: 70
            width: 56
            height: 56
            radius: 28
            bg_color: 0x0F3460
            border_color: 0x00B4D8
            border_width: 2
            widgets:
              - label: {text: "7", text_font: font_20, text_color: 0xE8E8E8, align: CENTER}
        - label: {x: 790, y: 132, text: "Готово", text_font: font_12, text_color: 0x8899AA, text_align: CENTER}

        # --- CURRENT PHASE NAME (large) ---
        - label:
            id: lbl_wash_phase_name
            x: 60
            y: 180
            text: "---"
            text_font: font_28
            text_color: 0x00B4D8

        # --- TEMPERATURE PANEL ---
        - obj:
            id: panel_wash_temp
            x: 60
            y: 230
            width: 500
            height: 140
            bg_color: 0x16213E
            radius: 8
            pad_all: 16
            widgets:
              - label:
                  text: "Температура"
                  text_font: font_18
                  text_color: 0x00B4D8
                  align: TOP_LEFT
              - label:
                  id: lbl_wash_temp
                  text: "--- / --- °C"
                  text_font: font_36
                  text_color: 0x00FF88
                  align: CENTER
              - label:
                  id: lbl_wash_temp_info
                  text: "Цель: ---°C | Макс: ---°C"
                  text_font: font_14
                  text_color: 0x8899AA
                  align: BOTTOM_LEFT

        # --- WASH CONTROL BUTTONS ---
        - obj:
            x: 60
            y: 400
            width: 1000
            height: 70
            bg_opa: 0
            layout:
              type: flex
              flex_flow: ROW
              pad_column: 24
            widgets:
              # START WASHING
              - btn:
                  id: btn_wash_start
                  width: 300
                  height: 64
                  bg_color: 0x007BFF
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "start_washing"
                  widgets:
                    - label: {text: "СТАРТ ПРОМЫВКИ", text_font: font_20, align: CENTER}

              # CONFIRM (hidden by default, shown in wait phases)
              - btn:
                  id: btn_wash_confirm
                  width: 300
                  height: 64
                  bg_color: 0x2D6A4F
                  hidden: true
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "confirm_wash"
                  widgets:
                    - label: {text: "ПОДТВЕРДИТЬ", text_font: font_20, align: CENTER}

              # STOP
              - btn:
                  id: btn_wash_stop
                  width: 300
                  height: 64
                  bg_color: 0xE63946
                  hidden: true
                  on_click:
                    - mqtt.publish:
                        topic: "ro_plant/command/mode"
                        payload: "stop"
                  widgets:
                    - label: {text: "СТОП", text_font: font_20, align: CENTER}

