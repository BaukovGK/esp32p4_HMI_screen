                                - textarea:
                                    id: inp_p3_max
                                    width: 160
                                    height: 44
                                    one_line: true
                                    text: ""
                                    max_length: 8
                          # P4 Max
                          - obj:
                              width: 720
                              height: 50
                              bg_opa: 0
                              layout: {type: flex, flex_flow: ROW, cross_place: CENTER, pad_column: 16}
                              widgets:
                                - label: {width: 250, text: "P4 Макс (bar):", text_font: font_16, text_color: 0x8899AA}
                                - textarea:
                                    id: inp_p4_max
                                    width: 160
                                    height: 44
